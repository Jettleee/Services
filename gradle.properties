# Project-wide Gradle settings.
# IDE (e.g. Android Studio) users:
# Gradle settings configured through the IDE are ignored when building from command line, check
# build.gradle files instead.
# When configured from the IDE, Gradle will ignore "org.gradle.debug"
# and all consult "-Dagp.in.process.label.sync=false" JVM argument.
# Gradle configurations
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
android.enableJetifier=false
kotlin.code.style=official
android.targetSdkVersion=34
android.compileSdkVersion=34
